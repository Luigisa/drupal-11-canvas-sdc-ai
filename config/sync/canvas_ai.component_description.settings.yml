component_context:
  sdc:
    enabled: 1
    data: |
      sdc.museothyssen.hello:
        id: sdc.museothyssen.hello
        name: Hello
        description: Hello
        group: 'Museo Thyssen'
        props:
          title:
            name: Title
            description: 'Main heading.'
            type: string
            default: Hello
          subtitle:
            name: Subtitle
            description: 'Supporting text under the title.'
            type: string
            default: 'Museo Thyssen-Bornemisza'
          image:
            name: Image
            description: "Obligatorio en este componente. Objeto Canvas (canvas:image): `src` obligatorio.\r\nRender array de Media/imagen: válido en runtime.\r\n"
            type: object
            default:
              src: 'https://placehold.co/600x400'
              alt: Placeholder
              width: 600
              height: 400
        slots: 'No slots'
      sdc.museothyssen.promo_banner:
        id: sdc.museothyssen.promo_banner
        name: 'Promo banner'
        description: 'Banner promocional dos columnas (copy + imagen), estilo Caaalma DS Primary.'
        group: 'Museo Thyssen'
        props:
          title:
            name: Title
            description: 'Titular (Title-1 / 5xl).'
            type: string
            default: 'Aprovecha ahora tu fibra y móvil gratis hasta marzo.'
          subtitle:
            name: Subtitle
            description: 'Subtítulo (Title-6 / lg).'
            type: string
            default: 'AdamoTV con 130 canales, de regalo'
          link_url:
            name: 'Link URL'
            description: 'Destino del CTA (tel, https, ruta relativa).'
            type: string
            default: 'tel:900651324'
          link_label:
            name: 'Link label'
            description: 'Texto visible del CTA.'
            type: string
            default: 'Llámanos gratis al 900 651 324'
          image:
            name: Image
            description: "Objeto Canvas (canvas:image) o render array de imagen en runtime.\r\n"
            type: object
            default:
              src: 'https://placehold.co/600x400'
              alt: Ilustración
              width: 600
              height: 400
        slots: 'No slots'
