# This is so your IDE knows about the syntax for fixes and autocomplete.
$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json

name: Hello
status: stable

# Asegura estilos del SDC canvas:image (srcset, etc.).
# @see https://project.pages.drupalcode.org/canvas/sdc-components/image/
libraryOverrides:
  dependencies:
    - canvas/image

props:
  type: object
  properties:
    attributes:
      type: Drupal\Core\Template\Attribute
      title: Attributes
      description: Wrapper attributes.
    title:
      type: string
      title: Title
      description: Main heading.
      examples:
        - Hello
    subtitle:
      type: string
      title: Subtitle
      description: Supporting text under the title.
      examples:
        - Museo Thyssen-Bornemisza
    image:
      $ref: json-schema-definitions://canvas.module/image
      type: object
      title: Image
      description: |
        Objeto forma Canvas (ver canvas:image): `src` obligatorio; `alt`, `width`, `height` opcionales.
        Render array de campo Media/imagen: válido en runtime (misma rama Twig que antes).
      examples:
        - src: https://placehold.co/600x400
          alt: Placeholder
          width: 600
          height: 400
